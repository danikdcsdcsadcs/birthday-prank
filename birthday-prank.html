<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ВНИМАНИЕ! ДОСТУП ОГРАНИЧЕН!</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Pacifico&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #09090b;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 2;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.92) translateY(20px);
        }

        /* --- ЭКРАН 1: АГРЕССИВНЫЙ 18+ ПРАНК --- */
        #prank-screen {
            background: radial-gradient(circle at center, #1c1115 0%, #09090b 100%);
        }

        .warning-header {
            color: #ff0055;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            animation: blink 0.6s infinite alternate;
        }

        @keyframes blink {
            0% { opacity: 0.3; }
            100% { opacity: 1; text-shadow: 0 0 15px #ff0055; }
        }

        /* Тряска баннера */
        @keyframes aggressiveShake {
            0% { transform: translate(3px, 2px) rotate(0deg); }
            10% { transform: translate(-2px, -3px) rotate(-1.5deg); }
            20% { transform: translate(-4px, 0px) rotate(2deg); }
            30% { transform: translate(0px, 3px) rotate(0deg); }
            40% { transform: translate(3px, -2px) rotate(-2deg); }
            50% { transform: translate(-2px, 4px) rotate(1.5deg); }
            60% { transform: translate(-4px, 2px) rotate(-1deg); }
            70% { transform: translate(4px, 3px) rotate(-2deg); }
            80% { transform: translate(-2px, -3px) rotate(2deg); }
            90% { transform: translate(3px, 4px) rotate(0deg); }
            100% { transform: translate(2px, -3px) rotate(-1.5deg); }
        }

        /* --- УВЕЛИЧЕННЫЙ ОБЪЕКТ (БАННЕР) --- */
        .fake-ad-banner {
            background: #ffffff;
            border-radius: 40px;
            padding: 24px 30px; /* Увеличили внутренние отступы */
            display: flex;
            align-items: center;
            gap: 22px; /* Увеличили расстояние между блоками внутри */
            max-width: 580px; /* Увеличили ширину с 480px до 580px */
            width: 100%;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.85), 0 15px 50px rgba(0, 0, 0, 0.9); /* Усилили неоновое свечение */
            margin-bottom: 60px;
            position: relative;
            animation: aggressiveShake 0.25s infinite; 
            user-select: none;
            border: 4px solid #ff0055;
        }

        /* Увеличенная аватарка Михаила */
        .ad-avatar-container {
            width: 120px; /* Было 85px, стало 120px */
            height: 120px;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
            border: 4px solid #ff0055;
            background: #222;
        }

        .ad-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .live-badge {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0055;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 3px 10px;
            border-radius: 12px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            letter-spacing: 0.5px;
        }

        .ad-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Крупные шрифты текста */
        .ad-title {
            font-size: 1.6rem; /* Было 1.3rem */
            font-weight: 900;
            color: #000000;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #00ff66;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 12px #00ff66;
        }

        .ad-subtitle {
            font-size: 1.15rem; /* Было 1rem */
            color: #d6004b;
            font-weight: 900;
            line-height: 1.3;
        }

        .ad-distance {
            font-size: 0.85rem;
            color: #666;
            margin-top: 6px;
            font-weight: bold;
        }

        .ad-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        /* Крупные кнопки на баннере */
        .ad-btn {
            padding: 10px 18px; /* Увеличили размер кликабельной зоны */
            font-size: 0.85rem;
            font-weight: 900;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            border: none;
            text-transform: uppercase;
        }

        .ad-btn-go {
            background: #0076ff;
            color: #fff;
            box-shadow: 0 4px 12px rgba(0, 118, 255, 0.4);
        }

        .ad-btn-close {
            background: #eaeaea;
            color: #555;
            font-size: 0.75rem;
        }

        .main-action-btn {
            background: linear-gradient(135deg, #ff0055 0%, #ff5500 100%);
            color: white;
            border: none;
            padding: 24px 75px;
            font-size: 1.8rem;
            font-weight: 900;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 0 35px rgba(255, 0, 85, 0.6);
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulseBtn 1.2s infinite cubic-bezier(0.66, 0, 0, 1);
        }

        @keyframes pulseBtn {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); }
            50% { transform: scale(1.08); box-shadow: 0 0 45px rgba(255, 0, 85, 1); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 0, 85, 0.5); }
        }

        /* --- ЭКРАН 2: НАСТОЯЩИЙ ПРАЗДНИК --- */
        #birthday-screen {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        #falling-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1; 
        }

        .greeting-card {
            text-align: center;
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(15px);
            padding: 50px 60px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.4);
            animation: float 4s ease-in-out infinite;
            z-index: 10; 
            position: relative;
            user-select: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(1deg); }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #fff;
            font-size: 4.8rem;
            text-shadow: 3px 5px 15px rgba(0,0,0,0.3);
            margin-bottom: 12px;
        }

        .subtitle {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 1px 2px 6px rgba(0,0,0,0.2);
        }

        /* Большие квадратные стикеры */
        .falling-sticker {
            position: absolute;
            top: -220px; 
            object-fit: cover;
            aspect-ratio: 1 / 1; 
            border-radius: 18px; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
            border: 5px solid #ffffff; 
            cursor: pointer;
            pointer-events: auto;
            user-select: none;
            will-change: transform, opacity;
        }

        /* Мобильная адаптация */
        @media (max-width: 600px) {
            .warning-header { font-size: 0.8rem; margin-bottom: 20px; }
            .fake-ad-banner { width: 95%; padding: 16px 18px; gap: 14px; margin-bottom: 45px; border-radius: 30px; }
            .ad-avatar-container { width: 85px; height: 85px; }
            .ad-title { font-size: 1.25rem; }
            .ad-subtitle { font-size: 0.95rem; }
            .ad-btn { padding: 8px 12px; font-size: 0.75rem; border-radius: 8px; }
            
            h1 { font-size: 2.8rem; }
            .subtitle { font-size: 1rem; }
            .greeting-card { padding: 35px 20px; width: 90%; }
            .main-action-btn { padding: 18px 50px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div id="prank-screen" class="screen">
        <div class="warning-header">⚠️ ТРЕБУЕТСЯ ВАШЕ МГНОВЕННОЕ ПРИСУТСТВИЕ!</div>
        
        <div class="fake-ad-banner">
            <div class="ad-avatar-container">
                <img class="ad-avatar" id="banner-thumb" alt="Mikhail">
                <div class="live-badge">LIVE 🔴</div>
            </div>
            <div class="ad-info">
                <div class="ad-title">Михаил, 21 <span class="online-dot"></span></div>
                <div class="ad-subtitle">Большой жеребец хочет тебя 🍌</div>
                <div class="ad-distance">📍 В сети (в 200 метрах от вас)</div>
            </div>
            <div class="ad-buttons">
                <button class="ad-btn ad-btn-go">Перейти</button>
                <button class="ad-btn ad-btn-close">Закрыть</button>
            </div>
        </div>
        
        <button class="main-action-btn" id="start-btn">Я ЗДЕСЬ</button>
    </div>

    <div id="birthday-screen" class="screen hidden">
        <div id="falling-container"></div>
        
        <div class="greeting-card">
            <h1>С днём рождения!</h1>
            <div class="subtitle">Ура! Наконец-то этот день настал! 🎉</div>
        </div>
    </div>

    <script>
        // Все 7 фотографий
        const imagePaths = [
            './birthday_prank/1.jpg', 
            './birthday_prank/2.jpg',  
            './birthday_prank/3.png',  
            './birthday_prank/4.jpg',
            './birthday_prank/5.jpg',
            './birthday_prank/6.jpg',
            './birthday_prank/7.jpg'  
        ];

        window.addEventListener('DOMContentLoaded', () => {
            const bannerImg = document.getElementById('banner-thumb');
            if (bannerImg && imagePaths[2]) {
                bannerImg.src = imagePaths[2];
                bannerImg.onerror = function() {
                    this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100%" height="100%" fill="%23ff0055"/><text x="50%" y="55%" font-family="Arial" font-weight="bold" font-size="11" fill="white" text-anchor="middle">НЕТ ФОТО 3</text></svg>';
                };
            }
        });

        const startBtn = document.getElementById('start-btn');
        const prankScreen = document.getElementById('prank-screen');
        const birthdayScreen = document.getElementById('birthday-screen');
        const fallingContainer = document.getElementById('falling-container');

        startBtn.addEventListener('click', () => {
            prankScreen.classList.add('hidden');
            birthdayScreen.classList.remove('hidden');
            startFallingSequence();
        });

        function createFallingSticker() {
            if (document.hidden) return;

            const img = document.createElement('img');
            const randomPath = imagePaths[Math.floor(Math.random() * imagePaths.length)];
            img.src = randomPath;
            img.className = 'falling-sticker';

            img.onerror = function() {
                const num = imagePaths.indexOf(randomPath) + 1;
                this.src = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 100 100"><rect width="100%" height="100%" fill="%2338ef7d"/><text x="50%" y="55%" font-family="Arial" font-weight="bold" font-size="14" fill="white" text-anchor="middle">Фото ${num || '?'}</text></svg>`;
            };

            // Размеры больших квадратов на втором экране
            let minSize = 110;
            let maxSize = 175;

            if (window.innerWidth < 600) {
                minSize = 85;
                maxSize = 130;
            }

            const size = Math.random() * (maxSize - minSize) + minSize;
            img.style.width = `${size}px`;
            img.style.height = `${size}px`;

            const startPosX = Math.random() * 80;
            img.style.left = `${startPosX}vw`;

            const driftX = (Math.random() - 0.5) * 160; 
            const startRotation = (Math.random() - 0.5) * 80;
            const endRotation = startRotation + (Math.random() - 0.5) * 200;

            const normSize = (size - minSize) / (maxSize - minSize); 
            const blurAmount = (1 - normSize) * 3; 
            
            let zIndex = Math.floor(normSize * 5) + 1; 
            if (normSize > 0.5) {
                zIndex += 10; 
            } else {
                zIndex = 1; 
            }
            
            const duration = 3400 + (1 - normSize) * 3600; 

            img.style.filter = `blur(${blurAmount}px) drop-shadow(0 12px 25px rgba(0,0,0,0.25))`;
            img.style.zIndex = zIndex;

            fallingContainer.appendChild(img);

            const fallAnimation = img.animate([
                { transform: `translate3d(0, -220px, 0) rotate(${startRotation}deg)`, opacity: 1 },
                { transform: `translate3d(${driftX}px, 115vh, 0) rotate(${endRotation}deg)`, opacity: 0.4 }
            ], {
                duration: duration,
                easing: 'linear'
            });

            let isPopping = false;

            function popSticker(e) {
                if (isPopping) return;
                isPopping = true;
                e.preventDefault();

                fallAnimation.cancel();
                const currentMatrix = window.getComputedStyle(img).transform;
                
                img.animate([
                    { transform: `${currentMatrix} scale(1)`, opacity: 1 },
                    { transform: `${currentMatrix} scale(1.7)`, opacity: 0 }
                ], {
                    duration: 160,
                    easing: 'ease-out',
                    fill: 'forwards'
                }).onfinish = () => { img.remove(); };
            }

            img.addEventListener('click', popSticker);
            img.addEventListener('touchstart', popSticker, { passive: false });

            fallAnimation.onfinish = () => {
                if (!isPopping) img.remove();
            };
        }

        function spawnLoop() {
            createFallingSticker();
            const nextDelay = Math.random() * 350 + 250;
            setTimeout(spawnLoop, nextDelay);
        }

        function startFallingSequence() {
            for (let i = 0; i < 6; i++) {
                setTimeout(createFallingSticker, i * 150);
            }
            spawnLoop();
        }
    </script>
</body>
</html>
